version: "3.9"
services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: decisionhub
      POSTGRES_PASSWORD: decisionhub
      POSTGRES_DB: decisionhub
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./decisionhub-backend
    environment:
      DATABASE_URL: postgresql://decisionhub:decisionhub@db:5432/decisionhub?schema=public
      JWT_SECRET: supersecretkey
    depends_on:
      - db
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./decisionhub-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db-data:
